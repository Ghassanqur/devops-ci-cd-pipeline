name: Docker CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "Dockerfile"
      - ".github/workflows/docker.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ghassanqur/devops-app:v1 .
          docker tag ghassanqur/devops-app:v1 ghassanqur/devops-app:latest

      - name: Push Docker image
        run: |
          docker push ghassanqur/devops-app:v1
          docker push ghassanqur/devops-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghassanqur/devops-app:latest
            docker stop $(docker ps -q) || true
            docker rm $(docker ps -aq) || true
            docker run -d -p 80:80 --name app ghassanqur/devops-app:latest
